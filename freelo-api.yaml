openapi: 3.0.3
info:
  title: Freelo API
  description: |
    API documentation for [Freelo.io](https://www.freelo.io) - Project Management Tool.
    
    ## Request Format
    All requests point to URL that begins with `https://api.freelo.io/v1/`.
    Each request must include a `User-Agent` HTTP header.
    
    ### Example: Projects List
    ```bash
    curl -u your@email.tld:API_KEY -H 'User-Agent: Your_App_Id (email@company.tld)' \
        https://api.freelo.io/v1/projects
    ```
    
    ## Response Format
    The API only supports JSON format in UTF-8 encoding.
    
    ## Authentication
    Authentication is done using HTTP Basic Authentication. Use your email as username and API key as password.
    You can find the API key in [settings](https://app.freelo.io/profil/nastaveni).
    
    ## Rate Limiting
    You can perform up to 25 requests per minute. If you exceed this limit, 429 Too Many Requests HTTP status code will be returned.
    You have to wait at least 60 seconds before sending another request.
    
    ## Currencies Format
    All currency amounts must be strings with exactly 2 decimal places multiplied by 100.
    
    Supported currencies: CZK, EUR, USD
    
    Examples:
    - `1,000.25` = `"100025"`
    - `1,000` = `"100000"`
    - `1` = `"100"`
    
    ## Pagination
    Pages are set via GET parameter `p` starting from 0.
    
    ## Ordering
    Use `order_by` and `order` (asc/desc) parameters where supported.

  version: "1.0.0"
  contact:
    name: Freelo Support
    url: https://www.freelo.io

servers:
  - url: "https://api.freelo.io/v1"
    description: "Production server"

security:
  - basicAuth: []

tags:
  - name: Projects
    description: Project management operations
  - name: Project Labels
    description: Project label management
  - name: Pinned Items
    description: Pinned items in projects
  - name: Tasklists
    description: Tasklist operations
  - name: Tasks
    description: Task management
  - name: Subtasks
    description: Subtask operations
  - name: Task Labels
    description: Task label management
  - name: Comments
    description: Comment operations
  - name: Time Tracking
    description: Time tracking operations
  - name: Work Reports
    description: Work report management
  - name: Invoicing
    description: Invoice operations
  - name: Users
    description: User management
  - name: Notifications
    description: Notification operations
  - name: Events
    description: Event operations
  - name: Files
    description: File operations
  - name: States
    description: State definitions
  - name: Custom Fields
    description: Custom field management
  - name: Notes
    description: Note operations
  - name: Search
    description: Search operations

paths:
  # ==================== PROJECTS ====================
  /projects:
    get:
      tags:
        - Projects
      summary: Get all own active projects
      description: Collection of all own (active) projects including active tasklists
      operationId: getProjects
      parameters:
        - name: order_by
          in: query
          description: Order column
          schema:
            type: string
            enum: [name, date_add, date_edited_at]
            default: name
        - name: order
          in: query
          description: Order direction
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectWithTasklists'
    post:
      tags:
        - Projects
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - currency_iso
              properties:
                name:
                  type: string
                  example: "Vegetable growing"
                currency_iso:
                  type: string
                  enum: [CZK, EUR, USD]
                project_owner_id:
                  type: integer
                  description: ID of user assigned as owner
      responses:
        '200':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectBasic'

  /all-projects:
    get:
      tags:
        - Projects
      summary: Get all projects (owned and invited)
      description: Paginated collection of all (owned and invited) projects
      operationId: getAllProjects
      parameters:
        - name: order_by
          in: query
          schema:
            type: string
            enum: [name, date_add, date_edited_at]
            default: date_add
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: tags[]
          in: query
          description: Filter by tags. Use "without" to get projects without tags.
          schema:
            type: array
            items:
              type: string
        - name: states_ids[]
          in: query
          description: "Project states: 1=active, 2=archived, 3=template"
          schema:
            type: array
            items:
              type: integer
              enum: [1, 2, 3]
        - name: users_ids[]
          in: query
          description: Filter by project owner IDs
          schema:
            type: array
            items:
              type: integer
        - name: created_in_range[date_from]
          in: query
          schema:
            type: string
            format: date
        - name: created_in_range[date_to]
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          projects:
                            type: array
                            items:
                              $ref: '#/components/schemas/ProjectFull'

  /invited-projects:
    get:
      tags:
        - Projects
      summary: Get invited projects
      description: Paginated collection of all invited projects
      operationId: getInvitedProjects
      parameters:
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          invited_projects:
                            type: array
                            items:
                              $ref: '#/components/schemas/ProjectWithTasklists'

  /archived-projects:
    get:
      tags:
        - Projects
      summary: Get archived projects
      description: Paginated collection of all archived projects
      operationId: getArchivedProjects
      parameters:
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          archived_projects:
                            type: array
                            items:
                              $ref: '#/components/schemas/ProjectWithTasklists'

  /template-projects:
    get:
      tags:
        - Projects
      summary: Get template projects
      description: Paginated collection of all template projects
      operationId: getTemplateProjects
      parameters:
        - name: order_by
          in: query
          schema:
            type: string
            enum: [name, date_add, date_edited_at]
            default: date_add
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: tags[]
          in: query
          schema:
            type: array
            items:
              type: string
        - name: users_ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
        - name: created_in_range[date_from]
          in: query
          schema:
            type: string
            format: date
        - name: created_in_range[date_to]
          in: query
          schema:
            type: string
            format: date
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          template_projects:
                            type: array
                            items:
                              $ref: '#/components/schemas/ProjectWithTasklists'

  /user/{user_id}/all-projects:
    get:
      tags:
        - Projects
      summary: Get user's projects
      description: Paginated collection of user's projects
      operationId: getUserProjects
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
        - name: states_ids[]
          in: query
          description: "States: 1=active, 2=archived, 3=template"
          schema:
            type: array
            items:
              type: integer
              enum: [1, 2, 3]
        - name: order_by
          in: query
          schema:
            type: string
            enum: [name, date_add, date_edited_at]
            default: date_add
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          projects:
                            type: array
                            items:
                              $ref: '#/components/schemas/ProjectFull'

  /project/{project_id}:
    get:
      tags:
        - Projects
      summary: Get project
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
    delete:
      tags:
        - Projects
      summary: Delete project
      operationId: deleteProject
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /project/{project_id}/workers:
    get:
      tags:
        - Projects
      summary: Get project workers
      description: Paginated collection of all project workers
      operationId: getProjectWorkers
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          workers:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserBasic'

  /project/{project_id}/archive:
    post:
      tags:
        - Projects
      summary: Archive project
      operationId: archiveProject
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /project/{project_id}/activate:
    post:
      tags:
        - Projects
      summary: Activate project
      operationId: activateProject
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /project/{project_id}/remove-workers/by-ids:
    post:
      tags:
        - Projects
      summary: Remove project workers by IDs
      operationId: removeProjectWorkersByIds
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - users_ids
              properties:
                users_ids:
                  type: array
                  items:
                    type: integer
                  example: [305, 150, 820]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /project/{project_id}/remove-workers/by-emails:
    post:
      tags:
        - Projects
      summary: Remove project workers by emails
      operationId: removeProjectWorkersByEmails
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - users_emails
              properties:
                users_emails:
                  type: array
                  items:
                    type: string
                    format: email
                  example: ["user1@freelo.io", "user2@freelo.io"]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /project/create-from-template/{template_id}:
    post:
      tags:
        - Projects
      summary: Create project from template
      operationId: createProjectFromTemplate
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                project_owner_id:
                  type: integer
                currency_iso:
                  type: string
                  enum: [CZK, EUR, USD]
                preset_date_from:
                  type: string
                  format: date
                  description: Date to set floating due dates in templates
                general_settings:
                  type: object
                  properties:
                    layout:
                      type: string
                      enum: [rows, kanban]
                      default: rows
                users_ids:
                  type: array
                  items:
                    type: integer
                  description: Users from template to invite
      responses:
        '200':
          description: Project created from template
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  owner:
                    $ref: '#/components/schemas/UserBasic'
                  currency_iso:
                    type: string

  # ==================== PROJECT LABELS ====================
  /project-labels/find-available:
    get:
      tags:
        - Project Labels
      summary: Find available project labels
      operationId: findAvailableProjectLabels
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  label:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProjectLabel'

  /project-labels/{labelId}:
    post:
      tags:
        - Project Labels
      summary: Edit project label
      operationId: editProjectLabel
      parameters:
        - name: labelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
                  pattern: '^#[0-9a-fA-F]{6}$'
                is_private:
                  type: boolean
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags:
        - Project Labels
      summary: Delete project label
      operationId: deleteProjectLabel
      parameters:
        - name: labelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /project-labels/add-to-project/{projectId}:
    post:
      tags:
        - Project Labels
      summary: Add project label to project
      operationId: addProjectLabelToProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
                is_private:
                  type: boolean
                id:
                  type: integer
                  description: ID of existing label
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /project-labels/remove-from-project/{projectId}:
    post:
      tags:
        - Project Labels
      summary: Remove project label from project
      operationId: removeProjectLabelFromProject
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
                is_private:
                  type: boolean
                id:
                  type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ==================== PINNED ITEMS ====================
  /project/{project_id}/pinned-items:
    get:
      tags:
        - Pinned Items
      summary: Get pinned items in project
      operationId: getPinnedItems
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PinnedItem'
    post:
      tags:
        - Pinned Items
      summary: Pin item to project
      operationId: pinItemToProject
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - link
              properties:
                link:
                  type: string
                  format: uri
                title:
                  type: string
      responses:
        '200':
          description: Item pinned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PinnedItem'

  /pinned-item/{pinned_item_id}:
    delete:
      tags:
        - Pinned Items
      summary: Delete pinned item
      operationId: deletePinnedItem
      parameters:
        - name: pinned_item_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ==================== TASKLISTS ====================
  /project/{project_id}/tasklists:
    post:
      tags:
        - Tasklists
      summary: Create tasklist
      operationId: createTasklist
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                budget:
                  type: string
                  description: Currency amount (2 decimal places, no separator)
      responses:
        '200':
          description: Tasklist created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasklistWithBudget'

  /all-tasklists:
    get:
      tags:
        - Tasklists
      summary: Get all tasklists
      description: Paginated collection of all tasklists
      operationId: getAllTasklists
      parameters:
        - name: projects_ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
        - name: order_by
          in: query
          schema:
            type: string
            enum: [name, date_add, date_edited_at]
            default: date_add
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          tasklists:
                            type: array
                            items:
                              $ref: '#/components/schemas/TasklistFull'

  /project/{project_id}/tasklist/{tasklist_id}/assignable-workers:
    get:
      tags:
        - Tasklists
      summary: Get assignable workers for tasklist
      operationId: getAssignableWorkers
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/TasklistIdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBasic'

  /tasklist/{tasklist_id}:
    get:
      tags:
        - Tasklists
      summary: Get tasklist
      operationId: getTasklist
      parameters:
        - $ref: '#/components/parameters/TasklistIdParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TasklistDetail'

  /tasklist/create-from-template/{template_id}:
    post:
      tags:
        - Tasklists
      summary: Create tasklist from template
      operationId: createTasklistFromTemplate
      parameters:
        - name: template_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tasklist_id
              properties:
                tasklist_id:
                  type: integer
                  description: ID of the tasklist from template
                target_project_id:
                  type: integer
                target_tasklist_id:
                  type: integer
                preset_date_from:
                  type: string
                  format: date
                users_ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Tasklist created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string

  # ==================== TASKS ====================
  /project/{project_id}/tasklist/{tasklist_id}/tasks:
    get:
      tags:
        - Tasks
      summary: Get tasks in tasklist
      operationId: getTasksInTasklist
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/TasklistIdParam'
        - name: order_by
          in: query
          schema:
            type: string
            enum: [priority, name, date_add, date_edited_at]
            default: priority
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskSummary'
    post:
      tags:
        - Tasks
      summary: Create task
      operationId: createTask
      parameters:
        - $ref: '#/components/parameters/ProjectIdParam'
        - $ref: '#/components/parameters/TasklistIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreated'

  /all-tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks
      description: Paginated collection of all tasks
      operationId: getAllTasks
      parameters:
        - name: search_query
          in: query
          description: Fulltext search query for the task name
          schema:
            type: string
        - name: state_id
          in: query
          description: ID of the tasks state
          schema:
            type: integer
        - name: projects_ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
        - name: tasklists_ids[]
          in: query
          schema:
            type: array
            items:
              type: integer
        - name: order_by
          in: query
          schema:
            type: string
            enum: [priority, name, date_add, date_edited_at]
            default: date_add
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: with_label
          in: query
          description: Filter by label name (case insensitive)
          schema:
            type: string
        - name: without_label
          in: query
          description: Exclude by label name (case insensitive)
          schema:
            type: string
        - name: no_due_date
          in: query
          description: Only tasks with no due date
          schema:
            type: boolean
            default: false
        - name: due_date_range[date_from]
          in: query
          schema:
            type: string
            format: date
