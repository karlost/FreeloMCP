  # ==================== SEARCH ====================
  /search:
    post:
      tags:
        - Search
      summary: Search using Elasticsearch
      operationId: search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - search_query
              properties:
                search_query:
                  type: string
                projects_ids:
                  type: array
                  items:
                    type: integer
                tasklists_ids:
                  type: array
                  items:
                    type: integer
                tasks_ids:
                  type: array
                  items:
                    type: integer
                authors_ids:
                  type: array
                  items:
                    type: integer
                workers_ids:
                  type: array
                  items:
                    type: integer
                state_ids:
                  type: array
                  items:
                    type: string
                    enum: [active, archived, finished, template, not_template, archived_finished, archived_unfinished]
                  default: [active]
                lang:
                  type: string
                  example: cs_cz
                due_date:
                  type: object
                  properties:
                    date_from:
                      type: string
                      format: date
                    date_to:
                      type: string
                      format: date
                entity_type:
                  type: string
                  enum: [task, subtask, project, tasklist, file, comment]
                page:
                  type: integer
                  default: 0
                limit:
                  type: integer
                  default: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/SearchResult'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Use your email as username and API key as password

  parameters:
    PageParam:
      name: p
      in: query
      description: Page number (starting from 0)
      schema:
        type: integer
        default: 0

    ProjectIdParam:
      name: project_id
      in: path
      required: true
      schema:
        type: integer

    TasklistIdParam:
      name: tasklist_id
      in: path
      required: true
      schema:
        type: integer

    TaskIdParam:
      name: task_id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    SuccessResponse:
      type: object
      properties:
        result:
          type: string
          example: success

    PaginatedResponse:
      type: object
      properties:
        total:
          type: integer
        count:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    Currency:
      type: object
      properties:
        amount:
          type: string
          description: Amount multiplied by 100
        currency:
          type: string
          enum: [CZK, EUR, USD]

    TaskBasic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    TaskWork:
      type: object
      properties:
        id:
          type: integer
        reported:
          type: string
          format: date-time
        minutes:
          type: integer
        cost:
          $ref: '#/components/schemas/Currency'
        notice:
          type: string
          nullable: true

    State:
      type: object
      properties:
        id:
          type: integer
        state:
          type: string
          enum: [active, archived, finished, deleted, template]

    UserBasic:
      type: object
      properties:
        id:
          type: integer
        fullname:
          type: string

    Client:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        company:
          type: string
        company_id:
          type: string
        company_tax_id:
          type: string
        street:
          type: string
        town:
          type: string
        zip:
          type: string

    TasklistBasic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    ProjectBasic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

